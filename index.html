<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>7-11 KPI</title>

<!-- PWA / ホーム画面対応 -->
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="7-11 KPI">
<meta name="application-name" content="7-11 KPI">
<meta name="theme-color" content="#006934">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" href="icon-192.png">

<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: linear-gradient(160deg, #1a4a2e 0%, #006934 45%, #004d26 100%);
    min-height: 100vh;
    min-height: -webkit-fill-available;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    padding-top: env(safe-area-inset-top, 20px);
  }
  .card {
    background: #fff;
    border-radius: 24px;
    padding: 40px 36px 32px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 24px 80px rgba(0,0,0,.40), 0 0 0 1px rgba(255,255,255,.1);
  }
  .icon-wrap { display: flex; justify-content: center; margin-bottom: 10px; }
  .app-icon { width: 100px; height: 100px; filter: drop-shadow(0 6px 16px rgba(0,0,0,.3)); }
  .app-title { text-align: center; font-size: 1.5rem; font-weight: 900; color: #1a1a1a; letter-spacing: .5px; margin-bottom: 4px; }
  .app-sub { text-align: center; font-size: .75rem; color: #64748b; margin-bottom: 28px; }
  h2 { font-size: 1rem; font-weight: 700; color: #334155; margin-bottom: 20px; text-align: center; padding-top: 20px; border-top: 1px solid #e2e8f0; }
  label { display: block; font-size: .78rem; font-weight: 700; color: #475569; margin-bottom: 6px; margin-top: 16px; }
  input[type=text], input[type=password] { width: 100%; padding: 13px 16px; border: 1.5px solid #cbd5e1; border-radius: 10px; font-size: 1rem; font-family: inherit; transition: border-color .2s, box-shadow .2s; outline: none; -webkit-appearance: none; }
  input:focus { border-color: #006934; box-shadow: 0 0 0 3px rgba(0,105,52,.15); }
  .btn { display: block; width: 100%; margin-top: 24px; padding: 15px; background: linear-gradient(135deg, #006934, #004d26); color: #fff; border: none; border-radius: 12px; font-family: inherit; font-size: 1rem; font-weight: 700; cursor: pointer; letter-spacing: .5px; transition: transform .1s, box-shadow .2s; box-shadow: 0 4px 16px rgba(0,105,52,.35); }
  .btn:hover { box-shadow: 0 6px 20px rgba(0,105,52,.45); }
  .btn:active { transform: scale(.98); }
  .error { display: none; background: #fff1f2; border: 1px solid #fecdd3; color: #be123c; border-radius: 10px; padding: 10px 14px; font-size: .82rem; font-weight: 500; margin-top: 16px; text-align: center; }
  .error.show { display: block; }
  footer { margin-top: 24px; text-align: center; font-size: .7rem; color: #94a3b8; }
  .install-hint { display: none; background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; border-radius: 10px; padding: 10px 14px; font-size: .75rem; margin-top: 14px; text-align: center; line-height: 1.5; }
  .install-hint.show { display: block; }
</style>
</head>
<body>
<div class="card">
  <div class="icon-wrap">
    <svg class="app-icon" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#f5d060"/><stop offset="25%" stop-color="#e8c040"/>
          <stop offset="50%" stop-color="#c8a020"/><stop offset="75%" stop-color="#e0b838"/>
          <stop offset="100%" stop-color="#b89020"/>
        </linearGradient>
        <linearGradient id="greenGrad" x1="0%" y1="0%" x2="60%" y2="100%">
          <stop offset="0%" stop-color="#1a5c38"/><stop offset="40%" stop-color="#006934"/>
          <stop offset="100%" stop-color="#003d1e"/>
        </linearGradient>
      </defs>
      <rect width="200" height="200" rx="44" fill="url(#goldGrad)"/>
      <circle cx="100" cy="100" r="86" fill="url(#greenGrad)"/>
      <circle cx="100" cy="100" r="82" fill="none" stroke="rgba(0,0,0,0.2)" stroke-width="1"/>
      <rect x="52" y="34" width="96" height="108" rx="12" fill="white"/>
      <rect x="60" y="44" width="80" height="22" rx="4" fill="#f97316"/>
      <path d="M110 66 L78 120 L88 120 L120 66Z" fill="#e8002d"/>
      <path d="M110 44 L138 44 L138 66 L110 66Z" fill="#e8002d"/>
      <text x="100" y="106" text-anchor="middle" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="20" fill="#006934" letter-spacing="3">KPI</text>
      <rect x="74" y="114" width="52" height="40" rx="6" fill="none" stroke="#006934" stroke-width="2.5"/>
      <rect x="79" y="119" width="42" height="10" rx="2" fill="#006934"/>
      <rect x="79" y="133" width="11" height="7" rx="1.5" fill="#006934"/>
      <rect x="95" y="133" width="11" height="7" rx="1.5" fill="#006934"/>
      <rect x="111" y="133" width="11" height="7" rx="1.5" fill="#006934"/>
      <rect x="79" y="144" width="11" height="7" rx="1.5" fill="#006934"/>
      <rect x="95" y="144" width="11" height="7" rx="1.5" fill="#006934"/>
      <rect x="111" y="144" width="11" height="14" rx="1.5" fill="#006934"/>
    </svg>
  </div>
  <div class="app-title">7-11 KPI</div>
  <div class="app-sub">横浜鶴見二ツ池店　販売管理サイト</div>
  <h2>🔐 スタッフログイン</h2>
  <form onsubmit="doLogin(event)">
    <label>ログインID</label>
    <input type="text" id="uid" autocomplete="username" placeholder="IDを入力" autofocus autocapitalize="off">
    <label>パスワード</label>
    <input type="password" id="pw" autocomplete="current-password" placeholder="パスワードを入力">
    <div class="error" id="err">⚠️ IDまたはパスワードが正しくありません</div>
    <button class="btn" type="submit">ログイン</button>
  </form>
  <div class="install-hint" id="installHint">
    📲 ホーム画面に追加するには<br>
    Safari → 共有ボタン → 「ホーム画面に追加」
  </div>
  <footer>横浜鶴見二ツ池店　スタッフ専用　©2026</footer>
</div>
<script>
  const _k = 'ft_auth_ok';
  if (sessionStorage.getItem(_k) === '1') { window.location.replace('report.html'); }
  function doLogin(e) {
    e.preventDefault();
    var uid = document.getElementById('uid').value.trim();
    var pw  = document.getElementById('pw').value;
    if (uid === atob('ZnV0YXRzdWlrZQ==') && pw === atob('ZnV0YXRzdWlrZUBAMzQ2NTA4')) {
      sessionStorage.setItem(_k, '1');
      window.location.replace('report.html');
    } else {
      document.getElementById('err').classList.add('show');
      document.getElementById('pw').value = '';
    }
  }
  var isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  var isInStandaloneMode = window.navigator.standalone;
  if (isIOS && !isInStandaloneMode) { document.getElementById('installHint').classList.add('show'); }
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() { navigator.serviceWorker.register('sw.js').catch(function(){}); });
  }
</script>
</body>
</html>
