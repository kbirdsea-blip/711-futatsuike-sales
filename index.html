<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>7-11 KPI</title>

<!-- PWA / ホーム画面対応 -->
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="7-11 KPI">
<meta name="application-name" content="7-11 KPI">
<meta name="theme-color" content="#006934">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" href="icon-192.png">

<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: linear-gradient(160deg, #1a4a2e 0%, #006934 45%, #004d26 100%);
    min-height: 100vh;
    min-height: -webkit-fill-available;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    padding-top: env(safe-area-inset-top, 20px);
  }
  .card {
    background: #fff;
    border-radius: 24px;
    padding: 40px 36px 32px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 24px 80px rgba(0,0,0,.40), 0 0 0 1px rgba(255,255,255,.1);
  }
  .icon-wrap { display: flex; justify-content: center; margin-bottom: 10px; }
  .app-icon { width: 100px; height: 100px; filter: drop-shadow(0 6px 16px rgba(0,0,0,.3)); }
  .app-title { text-align: center; font-size: 1.5rem; font-weight: 900; color: #1a1a1a; letter-spacing: .5px; margin-bottom: 4px; }
  .app-sub { text-align: center; font-size: .75rem; color: #64748b; margin-bottom: 28px; }
  h2 { font-size: 1rem; font-weight: 700; color: #334155; margin-bottom: 20px; text-align: center; padding-top: 20px; border-top: 1px solid #e2e8f0; }
  label { display: block; font-size: .78rem; font-weight: 700; color: #475569; margin-bottom: 6px; margin-top: 16px; }
  input[type=text], input[type=password] { width: 100%; padding: 13px 16px; border: 1.5px solid #cbd5e1; border-radius: 10px; font-size: 1rem; font-family: inherit; transition: border-color .2s, box-shadow .2s; outline: none; -webkit-appearance: none; }
  input:focus { border-color: #006934; box-shadow: 0 0 0 3px rgba(0,105,52,.15); }
  .btn { display: block; width: 100%; margin-top: 24px; padding: 15px; background: linear-gradient(135deg, #006934, #004d26); color: #fff; border: none; border-radius: 12px; font-family: inherit; font-size: 1rem; font-weight: 700; cursor: pointer; letter-spacing: .5px; transition: transform .1s, box-shadow .2s; box-shadow: 0 4px 16px rgba(0,105,52,.35); }
  .btn:hover { box-shadow: 0 6px 20px rgba(0,105,52,.45); }
  .btn:active { transform: scale(.98); }
  .error { display: none; background: #fff1f2; border: 1px solid #fecdd3; color: #be123c; border-radius: 10px; padding: 10px 14px; font-size: .82rem; font-weight: 500; margin-top: 16px; text-align: center; }
  .error.show { display: block; }
  footer { margin-top: 24px; text-align: center; font-size: .7rem; color: #94a3b8; }
  .install-hint { display: none; background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; border-radius: 10px; padding: 10px 14px; font-size: .75rem; margin-top: 14px; text-align: center; line-height: 1.5; }
  .install-hint.show { display: block; }
</style>
</head>
<body>
<div class="card">
  <div class="icon-wrap">
    <svg class="app-icon" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gold brushed metal gradient -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8e98c"/>
      <stop offset="12%" stop-color="#e8c835"/>
      <stop offset="28%" stop-color="#c8980e"/>
      <stop offset="42%" stop-color="#f0d458"/>
      <stop offset="55%" stop-color="#d4a820"/>
      <stop offset="68%" stop-color="#f5dc62"/>
      <stop offset="82%" stop-color="#c09018"/>
      <stop offset="100%" stop-color="#a87810"/>
    </linearGradient>
    <!-- Silver ring gradient -->
    <linearGradient id="silver" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8e8e8"/>
      <stop offset="30%" stop-color="#a0a0a0"/>
      <stop offset="55%" stop-color="#d8d8d8"/>
      <stop offset="80%" stop-color="#888"/>
      <stop offset="100%" stop-color="#c0c0c0"/>
    </linearGradient>
    <!-- Green circle gradient - radial from center -->
    <radialGradient id="green" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#2a7a4a"/>
      <stop offset="40%" stop-color="#006934"/>
      <stop offset="100%" stop-color="#002e16"/>
    </radialGradient>
    <!-- Card shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="2" dy="8" stdDeviation="8" flood-color="rgba(0,0,0,0.45)"/>
    </filter>
    <!-- Calculator shadow -->
    <filter id="calcShadow" x="-15%" y="-15%" width="130%" height="140%">
      <feDropShadow dx="1" dy="4" stdDeviation="5" flood-color="rgba(0,0,0,0.4)"/>
    </filter>
    <!-- White card gradient for 3D effect -->
    <linearGradient id="card" x1="0%" y1="0%" x2="5%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f0f0"/>
    </linearGradient>
  </defs>

  <!-- Gold rounded square frame -->
  <rect width="400" height="400" rx="90" fill="url(#gold)"/>

  <!-- Silver ring -->
  <circle cx="200" cy="200" r="178" fill="url(#silver)"/>
  <circle cx="200" cy="200" r="173" fill="#111"/>

  <!-- Green circle (main background) -->
  <circle cx="200" cy="200" r="170" fill="url(#green)"/>

  <!-- Calculator (behind card, bottom) -->
  <g filter="url(#calcShadow)">
    <rect x="132" y="255" width="136" height="108" rx="14" fill="#006934" opacity="0.95"/>
    <rect x="132" y="255" width="136" height="108" rx="14" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
    <!-- Display -->
    <rect x="144" y="266" width="112" height="26" rx="5" fill="rgba(0,0,0,0.3)"/>
    <rect x="144" y="266" width="112" height="26" rx="5" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <!-- Button rows -->
    <rect x="144" y="300" width="28" height="18" rx="4" fill="rgba(255,255,255,0.25)"/>
    <rect x="178" y="300" width="28" height="18" rx="4" fill="rgba(255,255,255,0.25)"/>
    <rect x="212" y="300" width="28" height="18" rx="4" fill="rgba(255,255,255,0.25)"/>
    <rect x="144" y="324" width="28" height="18" rx="4" fill="rgba(255,255,255,0.25)"/>
    <rect x="178" y="324" width="28" height="18" rx="4" fill="rgba(255,255,255,0.25)"/>
    <rect x="212" y="324" width="28" height="36" rx="4" fill="rgba(255,255,255,0.3)"/>
    <!-- + - signs on buttons -->
    <text x="158" y="313" text-anchor="middle" fill="white" font-size="12" font-weight="bold" opacity="0.9">+</text>
    <text x="192" y="313" text-anchor="middle" fill="white" font-size="12" font-weight="bold" opacity="0.9">-</text>
    <text x="158" y="337" text-anchor="middle" fill="white" font-size="10" font-weight="bold" opacity="0.9">×</text>
    <text x="192" y="337" text-anchor="middle" fill="white" font-size="10" font-weight="bold" opacity="0.9">=</text>
  </g>

  <!-- White card (main foreground) -->
  <g filter="url(#shadow)">
    <rect x="96" y="52" width="208" height="230" rx="22" fill="url(#card)"/>
    <rect x="96" y="52" width="208" height="230" rx="22" fill="none" stroke="rgba(0,0,0,0.08)" stroke-width="1"/>
  </g>

  <!-- Orange bar (top of 7) -->
  <rect x="110" y="72" width="180" height="48" rx="8" fill="#f97316"/>

  <!-- Red 7 numeral -->
  <!-- 7 top horizontal stroke (already orange bar) -->
  <!-- 7 diagonal stroke -->
  <path d="M250 120 L168 252 L192 252 L274 120 Z" fill="#e8002d"/>
  <!-- 7 right vertical part -->
  <path d="M248 72 L304 72 L304 120 L248 120 Z" fill="#e8002d"/>

  <!-- KPI text -->
  <text x="200" y="230" text-anchor="middle"
    font-family="Arial Black, Impact, sans-serif"
    font-weight="900" font-size="40"
    fill="#006934"
    letter-spacing="4">KPI</text>
</svg>
  </div>
  <div class="app-title">7-11 KPI</div>
  <div class="app-sub">横浜鶴見二ツ池店　販売管理サイト</div>
  <h2>🔐 スタッフログイン</h2>
  <form onsubmit="doLogin(event)">
    <label>ログインID</label>
    <input type="text" id="uid" autocomplete="username" placeholder="IDを入力" autofocus autocapitalize="off">
    <label>パスワード</label>
    <input type="password" id="pw" autocomplete="current-password" placeholder="パスワードを入力">
    <div class="error" id="err">⚠️ IDまたはパスワードが正しくありません</div>
    <button class="btn" type="submit">ログイン</button>
  </form>
  <div class="install-hint" id="installHint">
    📲 ホーム画面に追加するには<br>
    Safari → 共有ボタン → 「ホーム画面に追加」
  </div>
  <footer>横浜鶴見二ツ池店　スタッフ専用　©2026</footer>
</div>
<script>
  const _k = 'ft_auth_ok';
  if (sessionStorage.getItem(_k) === '1') { window.location.replace('report.html'); }
  function doLogin(e) {
    e.preventDefault();
    var uid = document.getElementById('uid').value.trim();
    var pw  = document.getElementById('pw').value;
    if (uid === atob('ZnV0YXRzdWlrZQ==') && pw === atob('ZnV0YXRzdWlrZUBAMzQ2NTA4')) {
      sessionStorage.setItem(_k, '1');
      window.location.replace('report.html');
    } else {
      document.getElementById('err').classList.add('show');
      document.getElementById('pw').value = '';
    }
  }
  var isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  var isInStandaloneMode = window.navigator.standalone;
  if (isIOS && !isInStandaloneMode) { document.getElementById('installHint').classList.add('show'); }
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() { navigator.serviceWorker.register('sw.js').catch(function(){}); });
  }
</script>
</body>
</html>
